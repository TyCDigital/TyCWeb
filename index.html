            content: '';

            inset: -1px;
            border-radius: inherit;

    <script>
        // Scroll progress + parallax
        window.addEventListener('scroll', () => {
            const bar = document.getElementById('scroll-bar');
            if (bar) {
                const total = document.body.scrollHeight - window.innerHeight;
                bar.style.width = (window.scrollY / total * 100) + '%';
            }
            // Parallax background images
            document.querySelectorAll('.parallax-bg').forEach(el => {
                const section = el.closest('section') || el.parentElement;
                const rect = section.getBoundingClientRect();
                if (rect.bottom < -100 || rect.top > window.innerHeight + 100) return;
                const speed = parseFloat(el.dataset.speed || 0.25);
                const offset = (rect.top + rect.height / 2 - window.innerHeight / 2) * speed;
                el.style.transform = `translateY(${offset}px)`;
            });
        }, { passive: true });
    </script>

        /* ================================================================
           PARTICLE CANVAS
        ================================================================ */
        const ParticleCanvas = () => {
            const ref = React.useRef(null);

            React.useEffect(() => {
                const canvas = ref.current;
                const ctx = canvas.getContext('2d');
                let animId;
                let mx = -9999, my = -9999;

                const dpr = Math.min(window.devicePixelRatio || 1, 2);

                const resize = () => {
                    canvas.width  = canvas.offsetWidth  * dpr;
                    canvas.height = canvas.offsetHeight * dpr;
                    ctx.scale(dpr, dpr);
                };
                resize();

                const W = () => canvas.offsetWidth;
                const H = () => canvas.offsetHeight;

                const N = window.innerWidth < 768 ? 35 : 65;
                const pts = Array.from({ length: N }, () => ({
                    x:  Math.random() * W(),
                    y:  Math.random() * H(),
                    vx: (Math.random() - 0.5) * 0.35,
                    vy: (Math.random() - 0.5) * 0.35,
                    r:  Math.random() * 1.5 + 0.5,
                    a:  Math.random() * 0.5 + 0.2,
                }));

                const onMove = e => { mx = e.clientX; my = e.clientY; };
                window.addEventListener('mousemove', onMove);
                window.addEventListener('resize', resize);

                const LINK = 140;
                const REPEL = 160;

                const draw = () => {
                    ctx.clearRect(0, 0, W(), H());

                    pts.forEach(p => {
                        const dx = p.x - mx, dy = p.y - my;
                        const d = Math.sqrt(dx*dx + dy*dy);
                        if (d < REPEL) {
                            const f = (REPEL - d) / REPEL * 0.18;
                            p.vx += (dx / d) * f;
                            p.vy += (dy / d) * f;
                        }
                        p.vx *= 0.978; p.vy *= 0.978;
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0) p.x = W(); else if (p.x > W()) p.x = 0;
                        if (p.y < 0) p.y = H(); else if (p.y > H()) p.y = 0;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(56,189,248,${p.a})`;
                        ctx.fill();
                    });

                    for (let i = 0; i < pts.length; i++) {
                        for (let j = i + 1; j < pts.length; j++) {
                            const dx = pts[i].x - pts[j].x;
                            const dy = pts[i].y - pts[j].y;
                            const d  = Math.sqrt(dx*dx + dy*dy);
                            if (d < LINK) {
                                ctx.beginPath();
                                ctx.moveTo(pts[i].x, pts[i].y);
                                ctx.lineTo(pts[j].x, pts[j].y);
                                ctx.strokeStyle = `rgba(59,130,246,${(1-d/LINK)*0.18})`;
                                ctx.lineWidth = 1;
                                ctx.stroke();
                            }
                        }
                    }
                    animId = requestAnimationFrame(draw);
                };
                draw();

                return () => {
                    cancelAnimationFrame(animId);
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('resize', resize);
                };
            }, []);

            return (
                <canvas ref={ref} style={{
                    position: 'absolute', inset: 0,
                    width: '100%', height: '100%',
                    opacity: 0.45, pointerEvents: 'none',
                }} />
            );
        };

        /* ================================================================

        ================================================================ */
        const TypeWriter = ({ words }) => {
            const [wIdx, setWIdx]     = React.useState(0);
            const [text, setText]     = React.useState('');
            const [deleting, setDel]  = React.useState(false);

            React.useEffect(() => {
                const word = words[wIdx];
                let t;
                if (!deleting) {
                    if (text.length < word.length) {
                        t = setTimeout(() => setText(word.slice(0, text.length + 1)), 75);
                    } else {
                        t = setTimeout(() => setDel(true), 2800);
                    }
                } else {
                    if (text.length > 0) {
                        t = setTimeout(() => setText(text.slice(0, -1)), 38);
                    } else {
                        setDel(false);
                        setWIdx((wIdx + 1) % words.length);
                    }
                }
                return () => clearTimeout(t);
            }, [text, deleting, wIdx, words]);

            return (
                <span className="text-gradient">
                    {text}<span className="tw-cursor" />
                </span>
            );
        };

        /* ================================================================

        ================================================================ */
        const CountUp = ({ to, suffix = '', duration = 1800 }) => {
            const [n, setN]   = React.useState(0);
            const [on, setOn] = React.useState(false);
            const ref = React.useRef(null);

            React.useEffect(() => {
                const obs = new IntersectionObserver(([e]) => {
                    if (e.isIntersecting) { setOn(true); obs.disconnect(); }
                }, { threshold: 0.5 });
                if (ref.current) obs.observe(ref.current);
                return () => obs.disconnect();
            }, []);

            React.useEffect(() => {
                if (!on) return;
                let start = null;
                const step = ts => {
                    if (!start) start = ts;
                    const p = Math.min((ts - start) / duration, 1);
                    const e = 1 - Math.pow(1 - p, 3);
                    setN(Math.floor(e * to));
                    if (p < 1) requestAnimationFrame(step);
                };
                requestAnimationFrame(step);
            }, [on]);

            return <span ref={ref}>{n}{suffix}</span>;
        };

        const useScrollReveal = () => {
            React.useEffect(() => {
                const obs = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const el = entry.target;
                            const delay = parseInt(el.dataset.delay || '0');
                            setTimeout(() => el.classList.add('visible'), delay);
                            obs.unobserve(el);
                        }
                    });
                }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

                document.querySelectorAll('.reveal, .reveal-left, .reveal-right')
                    .forEach(el => obs.observe(el));

                return () => obs.disconnect();
            }, []);
        };
